<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monash 把我毁了 - GitHub版</title>
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React & ReactDOM CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 编译 JSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FBFDFF; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 内置图标组件 ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                BookOpen: <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />,
                Calendar: (
                    <React.Fragment>
                        <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />
                        <line x1="16" x2="16" y1="2" y2="6" />
                        <line x1="8" x2="8" y1="2" y2="6" />
                        <line x1="3" x2="21" y1="10" y2="10" />
                    </React.Fragment>
                ),
                Clock: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                    </React.Fragment>
                ),
                Plus: (
                    <React.Fragment>
                        <line x1="12" x2="12" y1="5" y2="19" />
                        <line x1="5" x2="19" y1="12" y2="12" />
                    </React.Fragment>
                ),
                Trash2: (
                    <React.Fragment>
                        <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                        <line x1="10" x2="10" y1="11" y2="17" />
                        <line x1="14" x2="14" y1="11" y2="17" />
                    </React.Fragment>
                ),
                CheckCircle2: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10" />
                        <path d="m9 12 2 2 4-4" />
                    </React.Fragment>
                ),
                Circle: <circle cx="12" cy="12" r="10" />,
                LayoutDashboard: (
                    <React.Fragment>
                        <rect width="7" height="9" x="3" y="3" rx="1" />
                        <rect width="7" height="5" x="14" y="3" rx="1" />
                        <rect width="7" height="9" x="14" y="12" rx="1" />
                        <rect width="7" height="5" x="3" y="16" rx="1" />
                    </React.Fragment>
                ),
                ListTodo: (
                    <React.Fragment>
                        <rect width="18" height="18" x="3" y="3" rx="2" />
                        <path d="m9 10 2 2 4-4M9 16h6" />
                    </React.Fragment>
                ),
                TrendingUp: (
                    <React.Fragment>
                        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17" />
                        <polyline points="16 7 22 7 22 13" />
                    </React.Fragment>
                ),
                Settings2: (
                    <React.Fragment>
                        <path d="M20 7h-9M14 17H5" />
                        <circle cx="17" cy="17" r="3" />
                        <circle cx="7" cy="7" r="3" />
                    </React.Fragment>
                ),
                Check: <polyline points="20 6 9 17 4 12" />,
                ChevronRight: <polyline points="9 18 15 12 9 6" />,
                Database: (
                    <React.Fragment>
                        <ellipse cx="12" cy="5" rx="9" ry="3" />
                        <path d="M3 5V19A9 3 0 0 0 21 19V5" />
                        <path d="M3 12A9 3 0 0 0 21 12" />
                    </React.Fragment>
                ),
                Github: (
                    <React.Fragment>
                        <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4" />
                        <path d="M9 18c-4.51 2-5-2-7-2" />
                    </React.Fragment>
                ),
                Save: (
                    <React.Fragment>
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                        <polyline points="17 21 17 13 7 13 7 21" />
                        <polyline points="7 3 7 8 15 8" />
                    </React.Fragment>
                ),
                RefreshCw: (
                    <React.Fragment>
                        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
                        <path d="M21 3v5h-5" />
                        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" />
                        <path d="M3 21v-5h5" />
                    </React.Fragment>
                ),
                XCircle: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10" />
                        <line x1="15" x2="9" y1="9" y2="15" />
                        <line x1="9" x2="15" y1="9" y2="15" />
                    </React.Fragment>
                ),
                Layers: (
                    <React.Fragment>
                        <polygon points="12 2 2 7 12 12 22 7 12 2" />
                        <polyline points="2 17 12 22 22 17" />
                        <polyline points="2 12 12 17 22 12" />
                    </React.Fragment>
                )
            };
            return (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={className}
                >
                    {icons[name]}
                </svg>
            );
        };

        const COURSES_DATA = [
            { id: 'c1', name: '9131 Java', color: 'bg-[#FCE7F3]', borderColor: 'border-pink-200', textColor: 'text-pink-500', iconColor: 'bg-pink-400', barColor: '#ec4899' }, 
            { id: 'c2', name: '9132 数据库', color: 'bg-[#E0F2FE]', borderColor: 'border-blue-200', textColor: 'text-blue-500', iconColor: 'bg-blue-400', barColor: '#3b82f6' },
            { id: 'c3', name: '9136 Python', color: 'bg-[#FEF9C3]', borderColor: 'border-yellow-200', textColor: 'text-yellow-600', iconColor: 'bg-yellow-400', barColor: '#ca8a04' },
            { id: 'c4', name: '9137 导论', color: 'bg-[#DCFCE7]', borderColor: 'border-green-200', textColor: 'text-green-500', iconColor: 'bg-green-400', barColor: '#22c55e' }
        ];

        const SubtaskItem = ({ st, onUpdate, onDelete }) => {
            const [localTitle, setLocalTitle] = useState(st.title);
            const [localTime, setLocalTime] = useState(st.estimatedTime);
            const [isChanged, setIsChanged] = useState(false);

            useEffect(() => {
                setLocalTitle(st.title);
                setLocalTime(st.estimatedTime);
                setIsChanged(false);
            }, [st.title, st.estimatedTime]);

            const handleBlur = () => {
                if (isChanged) {
                    onUpdate(st.id, { title: localTitle, estimatedTime: Number(localTime) });
                    setIsChanged(false);
                }
            };

            return (
                <div className="flex items-center gap-2 bg-white p-2 rounded-xl border border-slate-100 group shadow-sm">
                    <input 
                        className="text-[11px] text-slate-600 bg-transparent focus:outline-none flex-grow font-medium"
                        value={localTitle}
                        onChange={(e) => { setLocalTitle(e.target.value); setIsChanged(true); }}
                        onBlur={handleBlur}
                    />
                    <div className="flex items-center gap-1">
                        <input 
                            type="number"
                            step="0.25"
                            className="w-10 text-right text-[10px] font-black text-slate-400 bg-transparent focus:outline-none"
                            value={localTime}
                            onChange={(e) => { setLocalTime(e.target.value); setIsChanged(true); }}
                            onBlur={handleBlur}
                        />
                        <span className="text-[9px] text-slate-300 font-bold">h</span>
                    </div>
                    <button onClick={() => onDelete(st.id)} className="p-1 text-slate-200 hover:text-red-400">
                        <Icon name="Trash2" size={11} />
                    </button>
                </div>
            );
        };

        const TaskCard = ({ task, courseTextColor, allSubtasks, onUpdateTask, onDeleteTask, onAddSubtask, onUpdateSubtask, onDeleteSubtask }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [localTitle, setLocalTitle] = useState(task.title);
            const [localTime, setLocalTime] = useState(task.estimatedTime);
            const [localDeadline, setLocalDeadline] = useState(task.deadline);
            
            const taskSubtasks = Array.isArray(allSubtasks) ? allSubtasks.filter(st => st.taskId === task.id) : [];
            const hasSubtasks = taskSubtasks.length > 0;
            const calculatedTime = hasSubtasks 
                ? taskSubtasks.reduce((acc, curr) => acc + (Number(curr.estimatedTime) || 0), 0)
                : Number(localTime);

            useEffect(() => { if (!isEditing) { setLocalTitle(task.title); setLocalTime(task.estimatedTime); setLocalDeadline(task.deadline); } }, [task, isEditing]);

            const handleSave = () => {
                onUpdateTask(task.id, { title: localTitle, estimatedTime: Number(localTime), deadline: localDeadline });
                setIsEditing(false);
            };

            return (
                <div className={`border border-slate-100 rounded-xl transition-all duration-300 ${isEditing ? 'bg-white ring-4 ring-slate-50 p-4 shadow-xl z-10 relative' : 'bg-slate-50/50 p-3 shadow-sm'}`}>
                    <div className="flex items-center justify-between gap-3">
                        {!isEditing ? (
                            <div className="flex items-center gap-2 flex-grow overflow-hidden">
                                <div className={`w-1 h-4 rounded-full ${courseTextColor.replace('text', 'bg')} opacity-40`} />
                                <span className={`font-bold text-xs truncate ${courseTextColor}`}>{task.title}</span>
                                {task.deadline && <span className="text-[9px] text-slate-300 bg-white px-1.5 rounded">{task.deadline}</span>}
                                <span className="text-[9px] font-black text-slate-500 bg-white px-2 py-0.5 rounded border border-slate-100 shrink-0">{calculatedTime.toFixed(2)}h</span>
                            </div>
                        ) : (
                            <input className={`bg-transparent font-bold focus:outline-none border-b border-slate-200 flex-grow text-xs py-1 ${courseTextColor}`} value={localTitle} onChange={(e) => setLocalTitle(e.target.value)} autoFocus />
                        )}
                        <div className="flex items-center gap-1.5">
                            {isEditing ? <button onClick={handleSave} className="p-1.5 rounded-lg bg-slate-900 text-white"><Icon name="Check" size={14} /></button> : <button onClick={() => setIsEditing(true)} className="p-1.5 rounded-lg bg-white text-slate-400 border border-slate-100 shadow-sm"><Icon name="Settings2" size={13} /></button>}
                        </div>
                    </div>
                    {isEditing && (
                        <div className="mt-4 space-y-4">
                            <div className="grid grid-cols-2 gap-3">
                                <div className="space-y-1">
                                    <label className="text-[9px] font-black text-slate-400 uppercase">截止日期</label>
                                    <input type="date" className="w-full bg-slate-50 p-2 rounded-xl text-[10px] font-bold outline-none" value={localDeadline} onChange={(e) => setLocalDeadline(e.target.value)} />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[9px] font-black text-slate-400 uppercase">预计时间</label>
                                    <input type="number" step="0.25" disabled={hasSubtasks} className="w-full bg-slate-50 p-2 rounded-xl text-[10px] font-bold outline-none" value={hasSubtasks ? calculatedTime.toFixed(2) : localTime} onChange={(e) => setLocalTime(e.target.value)} />
                                </div>
                            </div>
                            <div className="space-y-2 border-t pt-3">
                                {taskSubtasks.map(st => <SubtaskItem key={st.id} st={st} onUpdate={onUpdateSubtask} onDelete={onDeleteSubtask} />)}
                                <div className="flex gap-2">
                                    <button onClick={() => onAddSubtask(task.id)} className="flex-grow py-2 rounded-xl border border-dashed text-[9px] font-black text-slate-400 hover:bg-slate-50"><Icon name="Plus" size={12} className="inline mr-1" />添加环节</button>
                                    <button onClick={() => onDeleteTask(task.id)} className="px-3 rounded-xl bg-red-50 text-red-400"><Icon name="Trash2" size={14} /></button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        function App() {
            const [view, setView] = useState('courses');
            const [showConfig, setShowConfig] = useState(false);
            const [config, setConfig] = useState(() => JSON.parse(localStorage.getItem('gh_config') || '{"token":"","owner":"","repo":"","path":"data.json"}'));
            const [dbState, setDbState] = useState({ tasks: [], subtasks: [], dailyRecords: [], sha: null });
            const [loading, setLoading] = useState(false);
            const [status, setStatus] = useState("idle"); // idle, success, error
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);

            const syncWithGithub = async (dataToSave = null) => {
                if (!config.token || !config.owner || !config.repo) return;
                setLoading(true);
                const url = `https://api.github.com/repos/${config.owner}/${config.repo}/contents/${config.path}`;
                const headers = { 
                    Authorization: `token ${config.token}`, 
                    Accept: 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                };

                try {
                    if (dataToSave) {
                        const content = btoa(unescape(encodeURIComponent(JSON.stringify({
                            tasks: dataToSave.tasks || [],
                            subtasks: dataToSave.subtasks || [],
                            dailyRecords: dataToSave.dailyRecords || []
                        }, null, 2))));
                        const res = await fetch(url, { 
                            method: 'PUT', 
                            headers, 
                            body: JSON.stringify({ message: 'Sync Task Data', content, sha: dbState.sha }) 
                        });
                        if (res.ok) {
                            const json = await res.json();
                            setDbState(prev => ({ ...prev, sha: json.content.sha }));
                            setStatus("success");
                        } else {
                            setStatus("error");
                        }
                    } else {
                        const res = await fetch(url, { headers });
                        if (res.ok) {
                            const json = await res.json();
                            const decodedRaw = JSON.parse(decodeURIComponent(escape(atob(json.content))));
                            // 极重要的保底：确保 tasks 等始终为数组
                            const decoded = {
                                tasks: Array.isArray(decodedRaw.tasks) ? decodedRaw.tasks : [],
                                subtasks: Array.isArray(decodedRaw.subtasks) ? decodedRaw.subtasks : [],
                                dailyRecords: Array.isArray(decodedRaw.dailyRecords) ? decodedRaw.dailyRecords : []
                            };
                            setDbState({ ...decoded, sha: json.sha });
                            setStatus("success");
                        } else if (res.status === 404) {
                            setDbState({ tasks: [], subtasks: [], dailyRecords: [], sha: null });
                            setStatus("success");
                        } else {
                            setStatus("error");
                        }
                    }
                } catch (e) { 
                    console.error("GitHub Sync Error:", e); 
                    setStatus("error");
                } finally { 
                    setLoading(false); 
                }
            };

            useEffect(() => { syncWithGithub(); }, []);

            const updateDb = (newParts) => {
                const newState = { ...dbState, ...newParts };
                setDbState(newState);
                syncWithGithub(newState);
            };

            const getTaskTotalTime = (task) => {
                if (!task) return 0;
                const ts = Array.isArray(dbState.subtasks) ? dbState.subtasks.filter(st => st.taskId === task.id) : [];
                return ts.length > 0 ? ts.reduce((acc, curr) => acc + (Number(curr.estimatedTime) || 0), 0) : Number(task.estimatedTime) || 0;
            };

            const sortedTasks = useMemo(() => {
                if (!Array.isArray(dbState.tasks)) return [];
                return [...dbState.tasks].sort((a, b) => {
                    if (!a.deadline && !b.deadline) return (a.createdAt || 0) - (b.createdAt || 0);
                    if (!a.deadline) return 1;
                    if (!b.deadline) return -1;
                    const dateA = new Date(a.deadline);
                    const dateB = new Date(b.deadline);
                    if (dateA - dateB !== 0) return dateA - dateB;
                    return (a.createdAt || 0) - (b.createdAt || 0);
                });
            }, [dbState.tasks]);

            const courseStats = useMemo(() => {
                return COURSES_DATA.map(course => {
                    const cTasks = Array.isArray(dbState.tasks) ? dbState.tasks.filter(t => t.courseId === course.id) : [];
                    const totalTime = cTasks.reduce((acc, t) => acc + getTaskTotalTime(t), 0);
                    return { ...course, totalTime };
                });
            }, [dbState]);

            const globalTotalTime = courseStats.reduce((acc, c) => acc + c.totalTime, 0);
            const todaysRecords = Array.isArray(dbState.dailyRecords) ? dbState.dailyRecords.filter(r => r.date === selectedDate) : [];
            const remainingTime = todaysRecords.filter(r => !r.completed).reduce((acc, r) => acc + (Number(r.snapshotTime) || 0), 0);
            const completionRate = todaysRecords.length > 0 ? Math.round((todaysRecords.filter(r => r.completed).length / todaysRecords.length) * 100) : 0;

            const addTask = (courseId) => updateDb({ tasks: [...dbState.tasks, { id: Date.now().toString(), courseId, title: '新任务', deadline: '', estimatedTime: 1.0, createdAt: Date.now() }] });
            const updateTask = (id, data) => updateDb({ tasks: dbState.tasks.map(t => t.id === id ? { ...t, ...data } : t) });
            const deleteTask = (id) => updateDb({ tasks: dbState.tasks.filter(t => t.id !== id), subtasks: dbState.subtasks.filter(st => st.taskId !== id) });
            const addSubtask = (taskId) => updateDb({ subtasks: [...dbState.subtasks, { id: Date.now().toString(), taskId, title: '新环节', estimatedTime: 0.25 }] });
            const updateSubtask = (id, data) => updateDb({ subtasks: dbState.subtasks.map(st => st.id === id ? { ...st, ...data } : st) });
            const deleteSubtask = (id) => updateDb({ subtasks: dbState.subtasks.filter(st => st.id !== id) });

            const toggleDaily = (targetId, type) => {
                const recordId = `${selectedDate}_${targetId}`;
                if (dbState.dailyRecords.some(r => r.id === recordId)) {
                    updateDb({ dailyRecords: dbState.dailyRecords.filter(r => r.id !== recordId) });
                } else {
                    let snapTitle = "未知", snapCourse = "未知", snapTime = 0;
                    if (type === 'task') {
                        const t = dbState.tasks.find(i => i.id === targetId);
                        if (t) { snapTitle = t.title; snapCourse = COURSES_DATA.find(c => c.id === t.courseId)?.name || "未知"; snapTime = getTaskTotalTime(t); }
                    } else {
                        const st = dbState.subtasks.find(i => i.id === targetId);
                        if (st) { snapTitle = st.title; const pt = dbState.tasks.find(p => p.id === st.taskId); snapCourse = (COURSES_DATA.find(c => c.id === pt?.courseId)?.name || "未知") + " (环节)"; snapTime = Number(st.estimatedTime) || 0; }
                    }
                    updateDb({ dailyRecords: [...dbState.dailyRecords, { id: recordId, date: selectedDate, targetId, type, completed: false, snapshotTitle: snapTitle, snapshotCourse: snapCourse, snapshotTime: snapTime }] });
                }
            };

            const completeDaily = (record) => {
                const isNowDone = !record.completed;
                const newRecords = dbState.dailyRecords.map(r => r.id === record.id ? { ...r, completed: isNowDone } : r);
                if (isNowDone) {
                    if (record.type === 'task') updateDb({ dailyRecords: newRecords, tasks: dbState.tasks.filter(t => t.id !== record.targetId), subtasks: dbState.subtasks.filter(st => st.taskId !== record.targetId) });
                    else updateDb({ dailyRecords: newRecords, subtasks: dbState.subtasks.filter(st => st.id !== record.targetId) });
                } else updateDb({ dailyRecords: newRecords });
            };

            return (
                <div className="min-h-screen pb-32 px-4 md:px-10 max-w-[1200px] mx-auto pt-10">
                    <header className="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
                        <div className="flex items-center gap-4">
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100"><Icon name="Github" size={24} className="text-slate-400" /></div>
                            <div><h1 className="text-2xl font-black text-slate-900">Monash 把我毁了</h1><p className="text-[10px] font-black uppercase tracking-[0.3em] text-slate-300 italic">Survival Protocol v5.3</p></div>
                        </div>
                        <div className="flex items-center gap-4">
                            <nav className="bg-slate-100/50 p-1.5 rounded-xl border border-slate-100 flex gap-1">
                                <button onClick={() => setView('courses')} className={`px-6 py-2 rounded-lg text-xs font-black transition-all ${view === 'courses' ? 'bg-white text-slate-800 shadow-sm border' : 'text-slate-300'}`}>课程库</button>
                                <button onClick={() => setView('daily')} className={`px-6 py-2 rounded-lg text-xs font-black transition-all ${view === 'daily' ? 'bg-white text-slate-800 shadow-sm border' : 'text-slate-300'}`}>今日</button>
                            </nav>
                            <button onClick={() => setShowConfig(!showConfig)} className={`p-2 rounded-xl border transition-all ${status === 'error' ? 'bg-red-50 border-red-200 text-red-400' : showConfig ? 'bg-slate-800 text-white' : 'bg-white text-slate-400'}`}>
                                <Icon name="Database" size={20} />
                            </button>
                        </div>
                    </header>

                    <main>
                        {view === 'courses' ? (
                            <div className="space-y-8 animate-in fade-in duration-500">
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    {COURSES_DATA.map(course => (
                                        <div key={course.id} className={`bg-white rounded-2xl border-t-[6px] ${course.borderColor} shadow-lg p-6 flex flex-col h-[400px]`}>
                                            <div className="flex justify-between items-center mb-4">
                                                <h4 className={`font-black text-sm flex items-center gap-2 ${course.textColor}`}><div className={`w-2 h-2 rounded-full ${course.iconColor}`} />{course.name}</h4>
                                                <button onClick={() => addTask(course.id)} className={`p-1.5 rounded-lg bg-slate-50 ${course.textColor}`}><Icon name="Plus" size={16} /></button>
                                            </div>
                                            <div className="space-y-3 overflow-y-auto pr-1 custom-scrollbar">
                                                {sortedTasks.filter(t => t.courseId === course.id).length === 0 ? (
                                                    <div className="h-full flex items-center justify-center text-slate-200 text-[10px] font-black uppercase italic tracking-widest">Empty</div>
                                                ) : (
                                                    sortedTasks.filter(t => t.courseId === course.id).map(task => (
                                                        <TaskCard key={task.id} task={task} courseTextColor={course.textColor} allSubtasks={dbState.subtasks} onUpdateTask={updateTask} onDeleteTask={deleteTask} onAddSubtask={addSubtask} onUpdateSubtask={updateSubtask} onDeleteSubtask={deleteSubtask} />
                                                    ))
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="bg-white p-8 rounded-3xl border shadow-xl flex flex-col md:flex-row gap-8 justify-between items-center">
                                    <div><p className="text-slate-400 text-[10px] font-black mb-1">预计学业总负荷</p><h2 className="text-5xl font-black text-slate-900">{globalTotalTime.toFixed(2)} <span className="text-xl text-slate-200 uppercase">h</span></h2></div>
                                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                                        {courseStats.map(c => <div key={c.id} className="bg-slate-50 p-3 rounded-2xl text-center"><p className="text-[9px] font-black text-slate-300 mb-1">{c.name}</p><p className={`text-lg font-black ${c.textColor}`}>{c.totalTime.toFixed(2)}</p></div>)}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-8 flex flex-col lg:flex-row gap-8 animate-in slide-in-from-right duration-500">
                                <div className="lg:w-[300px] shrink-0 space-y-6">
                                    <div className="bg-white p-6 rounded-3xl shadow-sm border space-y-4">
                                        <p className="text-[10px] font-black text-slate-300 uppercase flex items-center gap-2"><Icon name="Calendar" size={12} />目标日期</p>
                                        <input type="date" className="w-full p-3 bg-slate-50 rounded-xl text-sm font-black outline-none" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} />
                                        <div className="p-4 bg-slate-900 rounded-2xl text-white">
                                            <p className="text-[9px] text-slate-400 font-black mb-1">完成度</p><p className="text-3xl font-black">{completionRate}%</p>
                                            <div className="w-full bg-slate-800 h-1.5 rounded-full mt-4 overflow-hidden"><div className="bg-emerald-400 h-full transition-all duration-500" style={{width:`${completionRate}%`}} /></div>
                                        </div>
                                        <div className="p-4 bg-white border border-slate-50 rounded-2xl text-center shadow-sm"><p className="text-[9px] text-slate-300 font-black mb-1">今日待办</p><p className="text-3xl font-black text-slate-800">{remainingTime.toFixed(2)}h</p></div>
                                    </div>
                                </div>
                                <div className="flex-grow space-y-8">
                                    <div className="bg-white p-8 rounded-3xl shadow-sm border">
                                        <h3 className="font-black text-slate-800 mb-6 flex items-center gap-2 text-sm"><Icon name="ListTodo" size={18} /> 执行清单</h3>
                                        <div className="space-y-3">
                                            {todaysRecords.length === 0 ? (
                                                <div className="py-20 text-center text-slate-200 text-xs font-bold uppercase tracking-widest italic border-2 border-dashed border-slate-50 rounded-3xl">List is empty</div>
                                            ) : (
                                                todaysRecords.map(r => (
                                                    <div key={r.id} className={`flex items-center gap-4 p-4 rounded-xl border transition-all ${r.completed ? 'opacity-30 grayscale bg-slate-50 border-transparent shadow-none' : 'bg-white border-slate-50 shadow-sm'}`}>
                                                        <button onClick={() => completeDaily(r)} className="text-slate-300">{r.completed ? <Icon name="CheckCircle2" size={24} className="text-emerald-400" /> : <Icon name="Circle" size={24} />}</button>
                                                        <div className="flex-grow"><p className={`text-sm font-black ${r.completed ? 'line-through' : 'text-slate-800'}`}>{r.snapshotTitle}</p><p className="text-[9px] font-black uppercase text-slate-400">{r.snapshotCourse}</p></div>
                                                        <div className="text-right"><p className="text-xs font-black text-slate-500">{Number(r.snapshotTime || 0).toFixed(2)}h</p><button onClick={() => toggleDaily(r.targetId, r.type)} className="text-[9px] text-red-300 mt-1 font-black">移除</button></div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                    <div className="bg-slate-50/50 p-8 rounded-3xl border border-dashed space-y-6">
                                        <div><h4 className="text-[10px] font-black text-slate-300 uppercase mb-4 tracking-[0.2em] flex items-center gap-1"><Icon name="BookOpen" size={10}/> 任务库导入</h4><div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                            {sortedTasks.map(t => {
                                                const isAdded = dbState.dailyRecords.some(r => r.id === `${selectedDate}_${t.id}`);
                                                return <div key={t.id} className="bg-white p-3 rounded-xl border flex justify-between items-center shadow-sm"><div className="overflow-hidden"><p className="text-[10px] font-black text-slate-400">{COURSES_DATA.find(c => c.id === t.courseId)?.name}</p><p className="text-xs font-bold truncate">{t.title}</p></div><button onClick={() => toggleDaily(t.id, 'task')} className={`px-4 py-1.5 rounded-lg text-[10px] font-black transition-all ${isAdded ? 'bg-slate-50 text-slate-200' : 'bg-slate-900 text-white active:scale-95'}`}>{isAdded ? '已加' : '选择'}</button></div>
                                            })}
                                        </div></div>
                                        <div className="border-t pt-6"><h4 className="text-[10px] font-black text-slate-300 uppercase mb-4 tracking-[0.2em] flex items-center gap-1"><Icon name="Layers" size={10}/> 环节库导入</h4><div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                            {Array.isArray(dbState.subtasks) && dbState.subtasks.map(st => {
                                                const isAdded = dbState.dailyRecords.some(r => r.id === `${selectedDate}_${st.id}`);
                                                const p = dbState.tasks.find(i => i.id === st.taskId);
                                                return <div key={st.id} className="bg-white p-3 rounded-xl border flex justify-between items-center shadow-sm"><div><p className="text-[10px] font-black text-slate-400">{COURSES_DATA.find(c => c.id === p?.courseId)?.name}</p><p className="text-xs font-bold">{st.title}</p></div><button onClick={() => toggleDaily(st.id, 'subtask')} className={`px-4 py-1.5 rounded-lg text-[10px] font-black transition-all ${isAdded ? 'bg-slate-50 text-slate-200' : 'bg-pink-500 text-white active:scale-95'}`}>{isAdded ? '已加' : '选择'}</button></div>
                                            })}
                                        </div></div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <div className={`fixed bottom-0 left-0 right-0 bg-white border-t p-8 transition-transform duration-500 z-50 shadow-2xl ${showConfig ? 'translate-y-0' : 'translate-y-full'}`}>
                        <div className="max-w-[1200px] mx-auto relative text-center">
                            <button onClick={() => setShowConfig(false)} className="absolute -top-14 right-0 bg-white p-2 rounded-full border shadow-lg text-slate-300 hover:text-slate-600"><Icon name="XCircle" size={20}/></button>
                            <div className="flex items-center gap-2 text-slate-800 font-black text-xs uppercase mb-4">
                                <Icon name="Database" size={14}/> GitHub 数据库配置 
                                {status === 'success' && <span className="ml-2 text-emerald-500 text-[10px]">已连接</span>}
                                {status === 'error' && <span className="ml-2 text-red-500 text-[10px]">连接失败，请检查配置</span>}
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                <input className="p-3 bg-slate-50 rounded-xl text-xs outline-none" placeholder="GitHub Token (PAT)" type="password" value={config.token} onChange={e => setConfig({...config, token: e.target.value})} />
                                <input className="p-3 bg-slate-50 rounded-xl text-xs outline-none" placeholder="用户名 (Owner)" value={config.owner} onChange={e => setConfig({...config, owner: e.target.value})} />
                                <input className="p-3 bg-slate-50 rounded-xl text-xs outline-none" placeholder="仓库名 (Repo)" value={config.repo} onChange={e => setConfig({...config, repo: e.target.value})} />
                                <button onClick={() => { localStorage.setItem('gh_config', JSON.stringify(config)); syncWithGithub(); setShowConfig(false); }} className="bg-slate-900 text-white rounded-xl text-xs font-black py-3 hover:bg-slate-800 transition-colors flex items-center justify-center gap-2">
                                    {loading && <Icon name="RefreshCw" size={12} className="animate-spin" />}
                                    保存并同步数据库
                                </button>
                            </div>
                            <p className="text-[10px] text-slate-400 mt-4 italic">提示：如果首次连接后仍然没有内容，请在“课程库”尝试添加一条新任务并保存，以初始化仓库中的 data.json。</p>
                        </div>
                    </div>

                    <footer className="py-20 border-t border-slate-50 text-center"><p className="text-slate-200 text-[10px] font-black tracking-[0.6em] uppercase">Destroyed by Monash | Clayton Survival Protocol</p></footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
